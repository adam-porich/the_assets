# nginx location block for The Assets portrait review app.
#
# This is NOT a standalone server block. Add it inside the existing finance
# server { listen 443 ssl; server_name desktop-g62m1s8.taild55c40.ts.net; }
# block so the review app is served under /butler/assets/.
#
# Reach it from Tailscale at:
#   https://desktop-g62m1s8.taild55c40.ts.net/butler/assets/

location = /butler/assets {
    return 301 /butler/assets/;
}

location /butler/assets/api/ {
    rewrite ^/butler/assets(/api/.*)$ $1 break;
    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /butler/assets/asset/ {
    rewrite ^/butler/assets(/asset/.*)$ $1 break;
    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /butler/assets/ {
    proxy_pass http://127.0.0.1:5182;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

